<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตารางโรงงานนรก</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
            font-size: 100px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            font-size: 26px; 
        }

        th {
            background-color: #2563eb;
            color: #fff;
            padding: 22px; 
            font-size: 18px;
        }

        td {
            padding: 26px; 
            border-bottom: 1px solid #e5e7eb;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        tr {
            height: 95px;
        }

        td:hover {
            background-color: #e0e7ff;
            transform: scale(1.03);
        }

        .time {
            color: #2563eb;
            font-weight: bold;
            cursor: default;
        }

        .mon { background-color: #facc15; }
        .tue { background-color: #ef4444; }
        .wed { background-color: #22c55e; }
        .thu { background-color: #f97316; }
        .fri { background-color: #3b82f6; }
        .sat { background-color: #8b5cf6; }
        .sun { background-color: #dc2626; }

        .time-head {
            background-color: #2563eb;
        }

        .note {
            margin-top: 20px;
            padding: 14px;
            background-color: #111;
            color: #fff;
            border-left: 5px solid #ff3b3b;
            border-radius: 6px;
            font-size: 20px;
        }

        .note strong {
            color: #ff3b3b;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>โรงงานนรก Lexus</h2>

    <table>
        <tr>
            <th class="time-head">Time/Day</th>
            <th class="mon">จันทร์</th>
            <th class="tue">อังคาร</th>
            <th class="wed">พุธ</th>
            <th class="thu">พฤหัสบดี</th>
            <th class="fri">ศุกร์</th>
            <th class="sat">เสาร์</th>
            <th class="sun">อาทิตย์</th>
        </tr>

        <tr>
            <td class="time">20.00 - 23.00</td>
            <td onclick="goPage('check.html')">ทำไห 10 อัน</td>
            <td onclick="goPage('check.html')">จกปูน</td>
            <td onclick="goPage('check.html')">เล่นร้าน</td>
            <td onclick="goPage('check.html')">ทำไห 10 อัน</td>
            <td onclick="goPage('check.html')">จกปูน</td>
            <td onclick="goPage('check.html')">ค้ายา</td>
            <td onclick="goPage('check.html')">ทำUfO (วันพักผ่อน)</td>
        </tr>
    </table>

    <div class="note">
        ⚠️ <strong>TEST BETA:</strong> ตารางนี้เป็นช่วงทดลองให้ผู้เล่นได้ทำกัน อาจมีการเปลี่ยนแปลงหากไม่เหมาะสม
    </div>

</div>

<script>
function goPage(page){
    window.location.href = page;
}
</script>

</body>
</html>
